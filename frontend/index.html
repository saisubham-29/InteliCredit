<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelli-Credit - AI-Powered Credit Appraisal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const API_BASE = 'http://127.0.0.1:8000';

        function App() {
            const [activeTab, setActiveTab] = useState('upload');
            const [companies, setCompanies] = useState([]);
            const [selectedCompany, setSelectedCompany] = useState('');
            const [analysis, setAnalysis] = useState(null);
            const [research, setResearch] = useState(null);
            const [explainability, setExplainability] = useState(null);
            const [loading, setLoading] = useState(false);
            const [uploadStatus, setUploadStatus] = useState('');

            useEffect(() => {
                fetchCompanies();
            }, []);

            const fetchCompanies = async () => {
                try {
                    const res = await fetch(`${API_BASE}/companies`);
                    const data = await res.json();
                    setCompanies(data.companies || []);
                } catch (err) {
                    console.error('Failed to fetch companies:', err);
                }
            };

            const handleUpload = async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                setLoading(true);
                setUploadStatus('Uploading documents...');

                try {
                    const res = await fetch(`${API_BASE}/upload-documents`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    setUploadStatus('✓ Documents uploaded successfully!');
                    fetchCompanies();
                    setTimeout(() => setUploadStatus(''), 3000);
                } catch (err) {
                    setUploadStatus('✗ Upload failed: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            const runAnalysis = async () => {
                if (!selectedCompany) return;
                setLoading(true);
                setActiveTab('analysis');

                try {
                    const res = await fetch(`${API_BASE}/analyze-company`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ company_id: selectedCompany })
                    });
                    const data = await res.json();
                    setAnalysis(data);

                    // Fetch research details
                    const researchRes = await fetch(`${API_BASE}/research-details/${selectedCompany}`);
                    const researchData = await researchRes.json();
                    setResearch(researchData);

                    // Fetch explainability
                    const explainRes = await fetch(`${API_BASE}/explainability/${selectedCompany}`);
                    const explainData = await explainRes.json();
                    setExplainability(explainData);
                } catch (err) {
                    alert('Analysis failed: ' + err.message);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-gradient-to-r from-blue-600 to-blue-800 text-white shadow-lg">
                        <div className="container mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center space-x-3">
                                    <i className="fas fa-brain text-3xl"></i>
                                    <div>
                                        <h1 className="text-2xl font-bold">Intelli-Credit</h1>
                                        <p className="text-sm text-blue-100">AI-Powered Credit Appraisal Engine</p>
                                    </div>
                                </div>
                                <div className="flex items-center space-x-4">
                                    <span className="text-sm bg-blue-700 px-3 py-1 rounded-full">
                                        <i className="fas fa-robot mr-1"></i> Enhanced Mode
                                    </span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Navigation */}
                    <nav className="bg-white shadow-sm border-b">
                        <div className="container mx-auto px-6">
                            <div className="flex space-x-8">
                                {['upload', 'analysis', 'research', 'explainability', 'cam'].map(tab => (
                                    <button
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`py-4 px-2 border-b-2 font-medium text-sm transition-colors ${
                                            activeTab === tab
                                                ? 'border-blue-600 text-blue-600'
                                                : 'border-transparent text-gray-500 hover:text-gray-700'
                                        }`}
                                    >
                                        {tab.charAt(0).toUpperCase() + tab.slice(1)}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="container mx-auto px-6 py-8">
                        {activeTab === 'upload' && <UploadTab onUpload={handleUpload} loading={loading} status={uploadStatus} />}
                        {activeTab === 'analysis' && (
                            <AnalysisTab 
                                companies={companies}
                                selectedCompany={selectedCompany}
                                setSelectedCompany={setSelectedCompany}
                                onAnalyze={runAnalysis}
                                analysis={analysis}
                                loading={loading}
                            />
                        )}
                        {activeTab === 'research' && <ResearchTab research={research} />}
                        {activeTab === 'explainability' && <ExplainabilityTab explainability={explainability} />}
                        {activeTab === 'cam' && <CAMTab companyId={selectedCompany} />}
                    </main>
                </div>
            );
        }

        function UploadTab({ onUpload, loading, status }) {
            return (
                <div className="max-w-4xl mx-auto">
                    <div className="bg-white rounded-lg shadow-md p-8">
                        <h2 className="text-2xl font-bold mb-6 flex items-center">
                            <i className="fas fa-upload mr-3 text-blue-600"></i>
                            Document Upload
                        </h2>
                        
                        <form onSubmit={onUpload} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Company Name
                                </label>
                                <input
                                    type="text"
                                    name="company_name"
                                    required
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    placeholder="e.g., Shakti Steel Pvt Ltd"
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Sector
                                </label>
                                <select
                                    name="sector"
                                    required
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                >
                                    <option value="manufacturing">Manufacturing</option>
                                    <option value="infrastructure">Infrastructure</option>
                                    <option value="real estate">Real Estate</option>
                                    <option value="pharma">Pharma</option>
                                    <option value="textiles">Textiles</option>
                                    <option value="logistics">Logistics</option>
                                </select>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">
                                    Upload Documents
                                </label>
                                <div className="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
                                    <i className="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-4"></i>
                                    <input
                                        type="file"
                                        name="files"
                                        multiple
                                        required
                                        className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
                                    />
                                    <p className="text-sm text-gray-500 mt-2">
                                        Upload Annual Reports, Bank Statements, GST Data, Legal Notices
                                    </p>
                                </div>
                            </div>

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-blue-600 text-white py-3 rounded-lg font-medium hover:bg-blue-700 disabled:bg-gray-400 transition-colors"
                            >
                                {loading ? 'Uploading...' : 'Upload Documents'}
                            </button>

                            {status && (
                                <div className={`p-4 rounded-lg ${status.includes('✓') ? 'bg-green-50 text-green-800' : 'bg-red-50 text-red-800'}`}>
                                    {status}
                                </div>
                            )}
                        </form>
                    </div>
                </div>
            );
        }

        function AnalysisTab({ companies, selectedCompany, setSelectedCompany, onAnalyze, analysis, loading }) {
            return (
                <div className="space-y-6">
                    <div className="bg-white rounded-lg shadow-md p-6">
                        <h2 className="text-2xl font-bold mb-4">Run Credit Analysis</h2>
                        <div className="flex gap-4">
                            <select
                                value={selectedCompany}
                                onChange={(e) => setSelectedCompany(e.target.value)}
                                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg"
                            >
                                <option value="">Select Company</option>
                                {companies.map(c => (
                                    <option key={c.id} value={c.id}>{c.name}</option>
                                ))}
                            </select>
                            <button
                                onClick={onAnalyze}
                                disabled={!selectedCompany || loading}
                                className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400"
                            >
                                {loading ? 'Analyzing...' : 'Run Analysis'}
                            </button>
                        </div>
                    </div>

                    {analysis && (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {/* ML Decision */}
                            <div className="bg-white rounded-lg shadow-md p-6">
                                <h3 className="text-xl font-bold mb-4 flex items-center">
                                    <i className="fas fa-robot mr-2 text-blue-600"></i>
                                    ML Decision
                                </h3>
                                <div className="space-y-3">
                                    <div className={`p-4 rounded-lg ${
                                        analysis.risk_report?.ml_decision?.final_decision === 'APPROVE' 
                                            ? 'bg-green-50' 
                                            : 'bg-red-50'
                                    }`}>
                                        <div className="font-bold text-lg">
                                            {analysis.risk_report?.ml_decision?.final_decision || 'N/A'}
                                        </div>
                                        <div className="text-sm mt-1">
                                            {analysis.risk_report?.ml_decision?.reason}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-gray-50 p-3 rounded">
                                            <div className="text-sm text-gray-600">PD</div>
                                            <div className="font-bold">
                                                {(analysis.risk_report?.ml_decision?.probability_of_default * 100).toFixed(2)}%
                                            </div>
                                        </div>
                                        <div className="bg-gray-50 p-3 rounded">
                                            <div className="text-sm text-gray-600">Risk Class</div>
                                            <div className="font-bold">
                                                {analysis.risk_report?.ml_decision?.risk_class}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Credit Limit */}
                            <div className="bg-white rounded-lg shadow-md p-6">
                                <h3 className="text-xl font-bold mb-4">Recommended Limit</h3>
                                <div className="text-3xl font-bold text-blue-600 mb-2">
                                    ₹{analysis.risk_report?.ml_decision?.recommended_limit?.recommended_limit_cr} Cr
                                </div>
                                <div className="text-sm text-gray-600 mb-4">
                                    Confidence: {(analysis.risk_report?.ml_decision?.ml_confidence * 100).toFixed(0)}%
                                </div>
                                <div className="bg-blue-50 p-3 rounded">
                                    <div className="text-sm font-medium">Interest Rate</div>
                                    <div className="text-2xl font-bold text-blue-600">
                                        {analysis.risk_report?.ml_decision?.pricing?.total_rate_pct}%
                                    </div>
                                    <div className="text-xs text-gray-600 mt-1">
                                        Base: {analysis.risk_report?.ml_decision?.pricing?.base_rate_pct}% + 
                                        Premium: {analysis.risk_report?.ml_decision?.pricing?.risk_premium_pct}%
                                    </div>
                                </div>
                            </div>

                            {/* Five Cs */}
                            <div className="bg-white rounded-lg shadow-md p-6 md:col-span-2">
                                <h3 className="text-xl font-bold mb-4">Five Cs Scoring</h3>
                                <div className="grid grid-cols-5 gap-4">
                                    {['character', 'capacity', 'capital', 'collateral', 'conditions'].map(c => (
                                        <div key={c} className="text-center">
                                            <div className="text-sm text-gray-600 mb-2 capitalize">{c}</div>
                                            <div className="text-2xl font-bold text-blue-600">
                                                {analysis.risk_report?.[c]?.score || 0}
                                            </div>
                                            <div className="text-xs text-gray-500 mt-1">
                                                / {analysis.risk_report?.[c]?.max_score || 0}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function ResearchTab({ research }) {
            if (!research) {
                return (
                    <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
                        <i className="fas fa-search text-4xl mb-4"></i>
                        <p>Run analysis first to see research results</p>
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    {/* Stats */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <div className="text-sm text-gray-600">Articles Found</div>
                                    <div className="text-3xl font-bold text-blue-600">
                                        {research.news_articles?.length || 0}
                                    </div>
                                </div>
                                <i className="fas fa-newspaper text-4xl text-blue-200"></i>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <div className="text-sm text-gray-600">Risk Indicators</div>
                                    <div className="text-3xl font-bold text-red-600">
                                        {research.web_crawl_stats?.risk_indicators || 0}
                                    </div>
                                </div>
                                <i className="fas fa-exclamation-triangle text-4xl text-red-200"></i>
                            </div>
                        </div>
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <div className="flex items-center justify-between">
                                <div>
                                    <div className="text-sm text-gray-600">Positive Signals</div>
                                    <div className="text-3xl font-bold text-green-600">
                                        {research.web_crawl_stats?.positive_signals || 0}
                                    </div>
                                </div>
                                <i className="fas fa-check-circle text-4xl text-green-200"></i>
                            </div>
                        </div>
                    </div>

                    {/* News Articles */}
                    <div className="bg-white rounded-lg shadow-md p-6">
                        <h3 className="text-xl font-bold mb-4 flex items-center">
                            <i className="fas fa-newspaper mr-2 text-blue-600"></i>
                            News & Research
                        </h3>
                        <div className="space-y-4">
                            {research.news_articles?.map((article, idx) => (
                                <div key={idx} className="border-l-4 border-blue-500 pl-4 py-2 hover:bg-gray-50">
                                    <div className="flex items-start justify-between">
                                        <div className="flex-1">
                                            <h4 className="font-semibold text-gray-900">{article.title}</h4>
                                            <p className="text-sm text-gray-600 mt-1">{article.snippet}</p>
                                            <div className="flex items-center gap-4 mt-2 text-xs text-gray-500">
                                                <span className={`px-2 py-1 rounded ${
                                                    article.sentiment === 'Positive' ? 'bg-green-100 text-green-800' :
                                                    article.sentiment === 'Negative' ? 'bg-red-100 text-red-800' :
                                                    'bg-gray-100 text-gray-800'
                                                }`}>
                                                    {article.sentiment}
                                                </span>
                                                <span>{new Date(article.date).toLocaleDateString()}</span>
                                                {article.risk_keywords?.length > 0 && (
                                                    <span className="text-red-600">
                                                        <i className="fas fa-exclamation-circle mr-1"></i>
                                                        {article.risk_keywords.join(', ')}
                                                    </span>
                                                )}
                                            </div>
                                        </div>
                                        {article.source && (
                                            <a
                                                href={article.source}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="ml-4 text-blue-600 hover:text-blue-800"
                                            >
                                                <i className="fas fa-external-link-alt"></i>
                                            </a>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Sector Outlook */}
                    <div className="bg-white rounded-lg shadow-md p-6">
                        <h3 className="text-xl font-bold mb-4">Sector Outlook</h3>
                        <div className="prose max-w-none">
                            {research.sector_outlook}
                        </div>
                    </div>
                </div>
            );
        }

        function ExplainabilityTab({ explainability }) {
            if (!explainability) {
                return (
                    <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
                        <i className="fas fa-lightbulb text-4xl mb-4"></i>
                        <p>Run analysis first to see decision explainability</p>
                    </div>
                );
            }

            return (
                <div className="space-y-6">
                    {/* Decision Summary */}
                    <div className="bg-white rounded-lg shadow-md p-6">
                        <h3 className="text-xl font-bold mb-4">Decision Explainability</h3>
                        <div className="bg-blue-50 border-l-4 border-blue-600 p-4 mb-4">
                            <div className="font-bold text-lg mb-2">{explainability.final_decision}</div>
                            <div className="text-gray-700">{explainability.decision_reason}</div>
                        </div>
                        
                        <div className="grid grid-cols-2 gap-4">
                            <div className="bg-gray-50 p-4 rounded">
                                <div className="text-sm text-gray-600">Probability of Default</div>
                                <div className="text-2xl font-bold text-red-600">
                                    {(explainability.probability_of_default * 100).toFixed(2)}%
                                </div>
                                <div className="text-sm text-gray-500 mt-1">
                                    Risk Class: {explainability.risk_class}
                                </div>
                            </div>
                            <div className="bg-gray-50 p-4 rounded">
                                <div className="text-sm text-gray-600">Pricing Breakdown</div>
                                <div className="text-2xl font-bold text-blue-600">
                                    {explainability.pricing_breakdown?.total_rate_pct}%
                                </div>
                                <div className="text-sm text-gray-500 mt-1">
                                    {explainability.pricing_breakdown?.justification}
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* ML Features */}
                    <div className="bg-white rounded-lg shadow-md p-6">
                        <h3 className="text-xl font-bold mb-4">ML Features Used</h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                            {Object.entries(explainability.ml_features_used || {}).map(([key, value]) => (
                                <div key={key} className="bg-gray-50 p-3 rounded">
                                    <div className="text-xs text-gray-600 capitalize">
                                        {key.replace(/_/g, ' ')}
                                    </div>
                                    <div className="font-bold">{value?.toFixed(2) || 'N/A'}</div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Conditions */}
                    <div className="bg-white rounded-lg shadow-md p-6">
                        <h3 className="text-xl font-bold mb-4">Lending Conditions</h3>
                        <ul className="space-y-2">
                            {explainability.conditions?.map((condition, idx) => (
                                <li key={idx} className="flex items-start">
                                    <i className="fas fa-check-circle text-green-600 mr-2 mt-1"></i>
                                    <span>{condition}</span>
                                </li>
                            ))}
                        </ul>
                    </div>
                </div>
            );
        }

        function CAMTab({ companyId }) {
            if (!companyId) {
                return (
                    <div className="bg-white rounded-lg shadow-md p-8 text-center text-gray-500">
                        <i className="fas fa-file-pdf text-4xl mb-4"></i>
                        <p>Select a company and run analysis first</p>
                    </div>
                );
            }

            return (
                <div className="bg-white rounded-lg shadow-md p-6">
                    <h3 className="text-xl font-bold mb-4">Download CAM Report</h3>
                    <div className="text-center py-8">
                        <i className="fas fa-file-pdf text-6xl text-red-600 mb-4"></i>
                        <p className="text-gray-600 mb-6">
                            Comprehensive Credit Appraisal Memo ready for download
                        </p>
                        <a
                            href={`${API_BASE}/download-cam/${companyId}`}
                            className="inline-block bg-red-600 text-white px-6 py-3 rounded-lg hover:bg-red-700"
                            download
                        >
                            <i className="fas fa-download mr-2"></i>
                            Download CAM PDF
                        </a>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
