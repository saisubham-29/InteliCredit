<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INTELLI-CREDIT Demo</title>
  <link rel="stylesheet" href="/frontend/styles.css" />
</head>
<body>
  <header class="hero">
    <div>
      <h1>INTELLI-CREDIT</h1>
      <p>AI-Powered Corporate Credit Appraisal Engine</p>
    </div>
    <div class="badge">Indian CAM Generator</div>
  </header>

  <main class="grid">
    <section class="card">
      <h2>1. Upload Documents</h2>
      <form id="upload-form">
        <label>
          Company Name
          <input type="text" id="company-name" placeholder="e.g., Shakti Steel Pvt Ltd" />
        </label>
        <label>
          Sector
          <input type="text" id="company-sector" placeholder="manufacturing" />
        </label>
        <label class="file">
          Select Files (PDF/CSV)
          <input type="file" id="files" multiple />
        </label>
        <button type="submit">Upload</button>
        <p id="upload-status" class="status"></p>
      </form>
    </section>

    <section class="card">
      <h2>2. Analyze Company</h2>
      <label>
        Company
        <select id="company-select"></select>
      </label>
      <button id="analyze-btn">Run Analysis</button>
      <p id="analysis-status" class="status"></p>

      <div class="gauge">
        <div class="gauge-label">Risk Score</div>
        <div class="gauge-bar">
          <div class="gauge-fill" id="gauge-fill"></div>
        </div>
        <div class="gauge-value" id="gauge-value">--</div>
      </div>

      <div class="drivers">
        <h3>Top Risk Drivers</h3>
        <ul id="drivers-list"></ul>
      </div>
    </section>

    <section class="card">
      <h2>3. Officer Inputs</h2>
      <form id="officer-form">
        <label>
          Factory Utilization %
          <input type="number" id="utilization" placeholder="65" />
        </label>
        <label>
          Management Quality Notes
          <textarea id="management-notes" rows="3" placeholder="Strong governance, seasoned promoter"></textarea>
        </label>
        <label>
          Site Visit Observations
          <textarea id="site-notes" rows="3" placeholder="Orderly operations, minor safety gaps"></textarea>
        </label>
        <button type="submit">Submit Inputs</button>
        <p id="officer-status" class="status"></p>
      </form>
    </section>

    <section class="card">
      <h2>4. CAM Output</h2>
      <button id="download-btn">Download CAM PDF</button>
      <p class="status" id="download-status"></p>
      <div class="note">
        CAM follows Indian banking style with Five-Cs assessment and RBI sensitivity notes.
      </div>
    </section>
  </main>

  <script src="/frontend/app.js"></script>
</body>
</html>
